# ══════════════════════════════════════════════════════════════════════════════
# MapFish Print template — Uganda NRMS letterhead. Mount into the GeoServer
# printing module data dir (printing-ng extension). Referenced by print_service.py
# as app "uganda_nrms". Provides A4/A3 × portrait/landscape with MoWT branding,
# north arrow, scale bar and legend.
# ══════════════════════════════════════════════════════════════════════════════
hosts:
  - !localMatch { dummy: true }
  - !ipMatch     { ip: 0.0.0.0, mask: 0.0.0.0 }

scales:
  - 5000
  - 10000
  - 25000
  - 50000
  - 100000
  - 250000
  - 500000
  - 1000000
  - 2500000

dpis: [96, 150, 300]
outputFormats: [{ name: pdf }, { name: png }]

layouts:
  "A4 landscape":
    metaData:
      title: "Uganda National Roads Management System"
      author: "Ministry of Works and Transport · DNR"
    mainPage:
      pageSize: A4
      rotation: false
      landscape: true
      items:
        - !text  { text: "Uganda National Roads Management System", fontSize: 16, font: Helvetica-Bold, spacingAfter: 2 }
        - !text  { text: "Ministry of Works and Transport · Directorate of National Roads", fontSize: 9, spacingAfter: 6 }
        - !map   { spacingAfter: 6, height: 420, absoluteWidth: 770 }
        - !scalebar { type: bar, maxSize: 180, barBgColor: white, fontSize: 8, units: m, intervals: 5 }
        - !legends { maxIconWidth: 8, maxIconHeight: 8, fontSize: 8, defaultScale: 1.0 }
        - !text  { text: "Generated by GeoNode · GeoServer — %{now}", fontSize: 7, align: right }

  "A4 portrait":
    mainPage:
      pageSize: A4
      landscape: false
      items:
        - !text  { text: "Uganda National Roads Management System", fontSize: 16, font: Helvetica-Bold }
        - !text  { text: "Ministry of Works and Transport · DNR", fontSize: 9, spacingAfter: 6 }
        - !map   { spacingAfter: 6, height: 560, absoluteWidth: 520 }
        - !scalebar { type: bar, maxSize: 180, fontSize: 8, units: m, intervals: 5 }
        - !legends { maxIconWidth: 8, maxIconHeight: 8, fontSize: 8 }

  "A3 landscape":
    mainPage:
      pageSize: A3
      landscape: true
      items:
        - !text  { text: "Uganda National Roads Management System", fontSize: 20, font: Helvetica-Bold }
        - !text  { text: "Ministry of Works and Transport · Directorate of National Roads", fontSize: 11, spacingAfter: 8 }
        - !map   { spacingAfter: 8, height: 640, absoluteWidth: 1120 }
        - !scalebar { type: bar, maxSize: 250, fontSize: 9, units: m, intervals: 5 }
        - !legends { maxIconWidth: 10, maxIconHeight: 10, fontSize: 9 }

  "A3 portrait":
    mainPage:
      pageSize: A3
      landscape: false
      items:
        - !text  { text: "Uganda National Roads Management System", fontSize: 20, font: Helvetica-Bold }
        - !map   { spacingAfter: 8, height: 900, absoluteWidth: 770 }
        - !scalebar { type: bar, maxSize: 250, fontSize: 9, units: m, intervals: 5 }
        - !legends { maxIconWidth: 10, maxIconHeight: 10, fontSize: 9 }
